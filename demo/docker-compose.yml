version: '3.8'

# StreamForge Demo — copy-paste runnable
#
#   docker-compose -f demo/docker-compose.yml up
#
# What it does:
#   1. Starts a single-node Kafka (KRaft, no Zookeeper)
#   2. Creates source and destination topics
#   3. Starts StreamForge with the demo pipeline config
#   4. Produces 100 synthetic e-commerce events to raw-events
#
# Watch the output:
#   docker exec -it demo-kafka kafka-console-consumer \
#     --bootstrap-server localhost:9092 --topic processed-events --from-beginning
#
#   docker exec -it demo-kafka kafka-console-consumer \
#     --bootstrap-server localhost:9092 --topic pii-safe --from-beginning

services:

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: demo-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "demo-cluster-001"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 10

  streamforge:
    image: ghcr.io/rahulbsw/streamforge:latest
    container_name: demo-streamforge
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      CONFIG_FILE: /app/config/pipeline.yaml
      RUST_LOG: info
    volumes:
      - ./pipeline.yaml:/app/config/pipeline.yaml:ro
    ports:
      - "9090:9090"   # Prometheus metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Produces 100 synthetic events then exits
  producer:
    image: python:3.11-slim
    container_name: demo-producer
    depends_on:
      streamforge:
        condition: service_healthy
    volumes:
      - ./produce_events.py:/produce_events.py:ro
    command: >
      sh -c "pip install kafka-python -q && python /produce_events.py"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
