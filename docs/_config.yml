title: StreamForge Documentation
description: Selective replication for Kafka, with Redpanda as a compatibility target
remote_theme: just-the-docs/just-the-docs
url: "https://github.datasierra.com"
baseurl: "/streamforge"

# Disable Liquid rendering in Markdown to avoid conflicts with
# Prometheus query syntax {{ $value }}, Go template {{ .Field }},
# and Helm/Kubernetes template syntax.
render_with_liquid: false

# Exclude non-documentation files
exclude:
  - "*.sh"
  - "archive"
  - "benchmarks"
  - "development"
  - "superpowers"
  - "CONFIG_SCHEMA.json"
  - Gemfile
  - Gemfile.lock
  - "ADVANCED_FILTERS.md"
  - "AT_LEAST_ONCE_AND_CACHE_BACKENDS.md"
  - "DSL_ARCHITECTURE.md"
  - "DSL_FEATURES.md"
  - "DSL_SIMPLIFICATION_INVENTORY.md"
  - "DSL_SPEC.md"
  - "DSL_V2_FUNCTION_SYNTAX.md"
  - "ENVELOPE_FEATURE_DESIGN.md"
  - "ENVELOPE_MIGRATION_GUIDE.md"
  - "ERROR_HANDLING.md"
  - "FUNCTION_STYLE_DSL_IMPLEMENTATION.md"
  - "HASH_AND_CACHE.md"
  - "IMPLEMENTATION_NOTES.md"
  - "IMPLEMENTATION_STATUS.md"
  - "OBSERVABILITY_IMPLEMENTATION_SUMMARY.md"
  - "OBSERVABILITY_METRICS_DESIGN.md"
  - "PARSER_REFACTOR_PLAN.md"
  - "PERFORMANCE_TESTING.md"
  - "PROJECT_SUMMARY.md"
  - "QUICK_REFERENCE.md"
  - "TEST_COVERAGE.md"
  - "TYPED_ENVELOPE_DESIGN.md"
  - "V1_GUARANTEES.md"

# just-the-docs configuration
color_scheme: dark   # options: default (light), dark

# Navigation
nav_sort: case_insensitive

defaults:
  - scope:
      path: "USAGE.md"
    values:
      has_children: true
  - scope:
      path: "AGGREGATIONS.md"
    values:
      parent: "Usage Guide"
      nav_order: 2
  - scope:
      path: "ADVANCED_DSL_GUIDE.md"
    values:
      parent: "Usage Guide"
  - scope:
      path: "YAML_CONFIGURATION.md"
    values:
      parent: "Usage Guide"
  - scope:
      path: "DEPLOYMENT.md"
    values:
      title: Deployment
      nav_order: 7
      has_children: true
  - scope:
      path: "DELIVERY_GUARANTEES.md"
    values:
      title: Delivery Guarantees
      nav_order: 8
  - scope:
      path: "OPERATIONS.md"
    values:
      title: Operations Runbook
      parent: "Deployment"
  - scope:
      path: "TROUBLESHOOTING.md"
    values:
      title: Troubleshooting
      parent: "Deployment"

# Search
search_enabled: true
search_tokenizer_separator: /[\s/]+/

# Footer
footer_content: "StreamForge — selective replication for Kafka, with Redpanda as a compatibility target. Apache 2.0 Licensed."

# Callouts (for notes/warnings in docs)
callouts_level: quiet
callouts:
  highlight:
    title: Note
    color: blue
  important:
    title: Important
    color: yellow
  new:
    title: New
    color: green
  warning:
    title: Warning
    color: red

# Aux nav links
aux_links:
  "GitHub":
    - "https://github.com/rahulbsw/streamforge"
  "Quickstart":
    - "https://github.datasierra.com/streamforge/QUICKSTART"
  "Compatibility":
    - "https://github.datasierra.com/streamforge/COMPATIBILITY"
aux_links_new_tab: true

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_time_format: "%b %e %Y at %I:%M %p"
