{{- if .Values.operator.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "streamforge-operator.fullname" . }}
  labels:
    {{- include "streamforge-operator.labels" . | nindent 4 }}
rules:
  # Watch and manage StreamforgePipeline CRDs
  - apiGroups:
      - streamforge.io
    resources:
      - streamforgepipelines
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - streamforge.io
    resources:
      - streamforgepipelines/status
    verbs:
      - get
      - update
      - patch

  # Manage Deployments for pipelines
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Manage ConfigMaps for pipeline configs
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Manage Secrets for credentials
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch

  # Manage Services
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Read Pods for status
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch

  # Events
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "streamforge-operator.fullname" . }}
  labels:
    {{- include "streamforge-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "streamforge-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "streamforge-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

{{- end }}
