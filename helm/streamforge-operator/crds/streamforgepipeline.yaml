apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: streamforgepipelines.streamforge.io
spec:
  group: streamforge.io
  names:
    kind: StreamforgePipeline
    plural: streamforgepipelines
    singular: streamforgepipeline
    shortNames:
      - sfp
      - pipeline
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - source
                - destinations
              properties:
                # Basic identification
                appid:
                  type: string
                  description: Application ID for the pipeline

                # Source configuration
                source:
                  type: object
                  required:
                    - brokers
                    - topic
                  properties:
                    brokers:
                      type: string
                      description: Comma-separated list of Kafka brokers
                    topic:
                      type: string
                      description: Source topic to consume from
                    groupId:
                      type: string
                      description: Consumer group ID
                    offset:
                      type: string
                      enum: [earliest, latest]
                      default: latest
                    security:
                      type: object
                      properties:
                        protocol:
                          type: string
                          enum: [PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL]
                          default: PLAINTEXT
                        ssl:
                          type: object
                          properties:
                            caLocation:
                              type: string
                            certificateLocation:
                              type: string
                            keyLocation:
                              type: string
                            keyPassword:
                              type: string
                        sasl:
                          type: object
                          properties:
                            mechanism:
                              type: string
                              enum: [PLAIN, SCRAM-SHA-256, SCRAM-SHA-512, GSSAPI, OAUTHBEARER]
                            username:
                              type: string
                            password:
                              type: string
                            kerberosServiceName:
                              type: string

                # Destinations configuration
                destinations:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - brokers
                      - topic
                    properties:
                      brokers:
                        type: string
                      topic:
                        type: string
                      filter:
                        type: string
                        description: Filter DSL expression
                      transform:
                        type: string
                        description: Transform DSL expression
                      partitioner:
                        type: string
                        enum: [default, random, hash, field]
                      partitionerField:
                        type: string
                      compression:
                        type: string
                        enum: [none, gzip, snappy, lz4, zstd]
                        default: none
                      security:
                        type: object
                        properties:
                          protocol:
                            type: string
                            enum: [PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL]
                          ssl:
                            type: object
                            properties:
                              caLocation:
                                type: string
                              certificateLocation:
                                type: string
                              keyLocation:
                                type: string
                          sasl:
                            type: object
                            properties:
                              mechanism:
                                type: string
                              username:
                                type: string
                              password:
                                type: string

                # Resource configuration
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        memory:
                          type: string
                          default: "128Mi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "1000m"
                        memory:
                          type: string
                          default: "512Mi"

                # Scaling configuration
                replicas:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Number of pipeline replicas

                # Additional settings
                threads:
                  type: integer
                  minimum: 1
                  default: 4
                  description: Number of consumer threads

                logLevel:
                  type: string
                  enum: [trace, debug, info, warn, error]
                  default: info

                # Pod configuration
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                      default: ghcr.io/rahulbsw/streamforge
                    tag:
                      type: string
                      default: latest
                    pullPolicy:
                      type: string
                      enum: [Always, IfNotPresent, Never]
                      default: IfNotPresent

                serviceAccount:
                  type: string
                  description: ServiceAccount to use for the pipeline

                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string

                tolerations:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

                affinity:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true

            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Failed, Stopped]
                  description: Current phase of the pipeline
                replicas:
                  type: integer
                  description: Number of ready replicas
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                lastUpdated:
                  type: string
                  format: date-time

      subresources:
        status: {}
        scale:
          specReplicasPath: .spec.replicas
          statusReplicasPath: .status.replicas

      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Replicas
          type: integer
          jsonPath: .status.replicas
        - name: Source
          type: string
          jsonPath: .spec.source.topic
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
