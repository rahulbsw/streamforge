appid: "orders-analytics-demo"
bootstrap: "localhost:9092"
input: "raw-orders"
offset: "earliest"
threads: 2

routing:
  routing_type: "filter"
  destinations:
    - output: "analytics-orders"
      filter: "AND:/region,==,us:/amount,>=,100"
      transform: "CONSTRUCT:order_id=/order_id:customer_id=/customer/id:amount=/amount:region=/region:created_at=/created_at"
      key_transform: "/order_id"
      headers:
        x-pipeline: "orders-analytics-demo"
        x-destination: "analytics"

    - output: "pii-safe-orders"
      filter: "EXISTS:/customer/email"
      transform: "CONSTRUCT:order_id=/order_id:email_hash=HASH:SHA256,/customer/email:amount=/amount:region=/region"
      key_transform: "/order_id"
      headers:
        x-pipeline: "orders-analytics-demo"
        x-destination: "pii-safe"

metrics:
  enabled: true
  port: 8080
